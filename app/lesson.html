<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Lesson | Skillbit</title>
    <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
    <header class="container">
        <a href="dashboard.html" class="logo">Skillbit</a>
        <nav>
            <span id="streak-count" style="color: #FF8C00; font-weight: 800;">🔥 0</span>
        </nav>
    </header>

    <main class="container">
        <div id="lesson-viewer" class="lesson-container">
            <!-- Content Injected by app.js -->
            <div class="card" style="text-align: center; padding: 100px 0;">
                <p>Loading your lesson...</p>
            </div>
        </div>
    </main>

    <script src="../shared/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('streak-count').innerText = '🔥 ' + profile.current_streak;
        });
    </script>
</body>
</html>
